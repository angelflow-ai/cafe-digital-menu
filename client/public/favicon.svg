<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .brown { fill: #8B4513; }
      .cream { fill: #F5E5CE; }
      .green { fill: #228B22; }
    </style>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="98" class="cream" stroke="#8B4513" stroke-width="4"/>
  <circle cx="100" cy="100" r="90" class="cream" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Stars -->
  <g class="brown">
    <polygon points="100,20 105,35 121,35 109,45 114,60 100,50 86,60 91,45 79,35 95,35"/>
    <polygon points="70,40 73,50 85,50 76,56 79,66 70,60 61,66 64,56 55,50 67,50"/>
    <polygon points="130,40 133,50 145,50 136,56 139,66 130,60 121,66 124,56 115,50 127,50"/>
  </g>
  
  <!-- Cup body -->
  <ellipse cx="100" cy="80" rx="35" ry="28" class="brown" stroke="#654321" stroke-width="2"/>
  
  <!-- Cup handle -->
  <path d="M 135 85 Q 155 85 155 105" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Steam/leaf design -->
  <path d="M 95 50 Q 92 35 100 25 Q 108 35 105 50" stroke="#228B22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100 30 Q 95 25 92 30" stroke="#228B22" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" class="brown">THE INFUSION</text>
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" class="brown">SAGA</text>
</svg>